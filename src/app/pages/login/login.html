<div class="auth-container">
  <div class="auth-wrapper">
    <div class="auth-sidebar">
      <div class="auth-brand">
        <h1 class="brand-logo">
          Electro<span class="text-primary">.</span>
          <span class="brand-sub">DZ</span>
        </h1>
        <p class="brand-tagline">
          Votre boutique électronique #1 en Algérie
        </p>
      </div>
      <div class="auth-features">
        <div class="auth-feature">
          <i class="bi bi-truck"></i>
          <span>Livraison gratuite</span>
        </div>
        <div class="auth-feature">
          <i class="bi bi-shield-check"></i>
          <span>Paiement sécurisé</span>
        </div>
        <div class="auth-feature">
          <i class="bi bi-headset"></i>
          <span>Support 24/7</span>
        </div>
      </div>
    </div>
    
    <div class="auth-content">
      <div class="auth-header">
        <h2 class="auth-title">Connexion</h2>
        <p class="auth-subtitle">
          Bienvenue! Veuillez vous connecter à votre compte
        </p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger">
        <i class="bi bi-exclamation-circle"></i>
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label class="form-label">
            <i class="bi bi-envelope"></i>
            Adresse email
          </label>
          <input 
            type="email" 
            class="form-control" 
            placeholder="name@example.com"
            [(ngModel)]="loginData.email"
            name="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="bi bi-lock"></i>
            Mot de passe
          </label>
          <input 
            type="password" 
            class="form-control" 
            placeholder="••••••••"
            [(ngModel)]="loginData.password"
            name="password"
            required
          >
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox">
            <span>Se souvenir de moi</span>
          </label>
          <a href="#" class="forgot-password">Mot de passe oublié?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
          <span *ngIf="isLoading" class="spinner"></span>
          <span *ngIf="!isLoading">Se connecter</span>
          <span *ngIf="isLoading">Connexion en cours...</span>
        </button>

        <div class="auth-divider">
          <span>Ou continuer avec</span>
        </div>

        <div class="social-login">
          <button type="button" class="btn-social">
            <i class="bi bi-google"></i>
            Google
          </button>
          <button type="button" class="btn-social">
            <i class="bi bi-facebook"></i>
            Facebook
          </button>
        </div>

        <p class="auth-footer">
          Pas encore de compte? 
          <a routerLink="/register" class="text-primary">Créer un compte</a>
        </p>
      </form>
    </div>
  </div>
</div>
