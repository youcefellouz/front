<div class="success-container">
  <div class="container">
    <div class="success-card">
      <div class="success-icon">
        <i class="bi bi-check-circle-fill"></i>
      </div>
      
      <h1 class="success-title">Merci pour votre commande!</h1>
      <p class="success-subtitle">Votre commande a été enregistrée avec succès</p>
      
      <div class="order-info">
        <div class="info-row">
          <span class="info-label">Numéro de commande:</span>
          <span class="info-value">{{orderReference}}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Date:</span>
          <span class="info-value">{{orderDate | date:'dd/MM/yyyy HH:mm'}}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Total:</span>
          <span class="info-value total">{{totalAmount | number:'1.0-0'}} DA</span>
        </div>
      </div>
      
      <div class="success-message">
        <i class="bi bi-envelope"></i>
        <p>Une confirmation a été envoyée à votre adresse email</p>
      </div>
      
      <div class="success-actions">
        <button class="btn btn-primary btn-lg" routerLink="/orders">
          <i class="bi bi-list"></i>
          Suivre mes commandes
        </button>
        <button class="btn btn-outline btn-lg" routerLink="/products">
          <i class="bi bi-bag"></i>
          Continuer les achats
        </button>
      </div>
    </div>
  </div>
</div>
