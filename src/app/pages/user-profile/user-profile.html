<div class="profile-section section-padding">
  <div class="container">
    <div class="profile-layout">
      <!-- Sidebar -->
      <aside class="profile-sidebar">
        <div class="user-card">
          <div class="user-avatar">
            <i class="bi bi-person-circle"></i>
          </div>
          <h3 class="user-name">{{user?.name}}</h3>
          <p class="user-email">{{user?.email}}</p>
        </div>
        
        <nav class="profile-nav">
          <a routerLink="/profile" routerLinkActive="active" class="nav-item">
            <i class="bi bi-person"></i>
            <span>Mon Profil</span>
          </a>
          <a routerLink="/orders" routerLinkActive="active" class="nav-item">
            <i class="bi bi-bag"></i>
            <span>Mes Commandes</span>
          </a>
          <a routerLink="/wishlist" routerLinkActive="active" class="nav-item">
            <i class="bi bi-heart"></i>
            <span>Favoris</span>
          </a>
          <a routerLink="/addresses" routerLinkActive="active" class="nav-item">
            <i class="bi bi-geo-alt"></i>
            <span>Adresses</span>
          </a>
          <a (click)="logout()" class="nav-item logout">
            <i class="bi bi-box-arrow-right"></i>
            <span>Déconnexion</span>
          </a>
        </nav>
      </aside>

      <!-- Content -->
      <main class="profile-content">
        <h2 class="content-title">Mon Profil</h2>
        
        <form (ngSubmit)="updateProfile()" class="profile-form">
          <div class="form-row">
            <div class="form-group">
              <label>Nom complet</label>
              <input type="text" class="form-control" [(ngModel)]="profileData.name" name="name" required>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" class="form-control" [(ngModel)]="profileData.email" name="email" required>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>Téléphone</label>
              <input type="tel" class="form-control" [(ngModel)]="profileData.telephone" name="telephone">
            </div>
            <div class="form-group">
              <label>Adresse</label>
              <input type="text" class="form-control" [(ngModel)]="profileData.adresse" name="adresse">
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" [disabled]="isSaving">
              <span *ngIf="isSaving" class="spinner"></span>
              Enregistrer les modifications
            </button>
          </div>
        </form>
      </main>
    </div>
  </div>
</div>
