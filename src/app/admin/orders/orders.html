<div class="orders-management">
  <div class="page-header">
    <h2>Gestion des Commandes</h2>
  </div>

  <div class="table-card">
    <div class="table-responsive">
      <table class="data-table">
        <thead>
          <tr>
            <th>Commande</th>
            <th>Client</th>
            <th>Date</th>
            <th>Montant</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let order of orders">
            <td><strong>#{{order.reference}}</strong></td>
            <td>{{order.user?.name}}</td>
            <td>{{order.created_at | date:'dd/MM/yyyy'}}</td>
            <td>{{order.total_amount | number:'1.0-0'}} DA</td>
            <td>
              <select class="status-select" [(ngModel)]="order.status" (change)="updateStatus(order)">
                <option value="pending">En attente</option>
                <option value="confirmed">Confirmée</option>
                <option value="shipped">Expédiée</option>
                <option value="delivered">Livrée</option>
                <option value="cancelled">Annulée</option>
              </select>
            </td>
            <td>
              <button class="btn-icon btn-view" (click)="viewOrder(order)">
                <i class="bi bi-eye"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
